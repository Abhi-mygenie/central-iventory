<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Control Dashboard — Central Inventory</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo">CTRL</span>
      <h1>Central Inventory — Dev Control</h1>
    </div>
    <div class="topbar-right">
      <span id="gen-time" class="meta-tag"></span>
      <span id="branch-tag" class="meta-tag"></span>
    </div>
  </header>

  <section id="summary-cards"></section>

  <nav id="tab-bar">
    <button class="tab active" data-tab="debt">Closure Debt</button>
    <button class="tab" data-tab="bugs">Bug Tracker</button>
    <button class="tab" data-tab="crs">CR Registry</button>
  </nav>

  <section id="filter-bar">
    <input type="text" id="search-input" placeholder="Search by ID, title, file..." />
    <select id="sprint-filter"><option value="">All Sprints</option></select>
    <select id="severity-filter"><option value="">All Severities</option></select>
    <select id="status-filter"><option value="">All Statuses</option></select>
    <button id="csv-export-btn">Export CSV</button>
  </section>

  <main id="content">
    <div id="tab-debt" class="tab-panel active"></div>
    <div id="tab-bugs" class="tab-panel"></div>
    <div id="tab-crs" class="tab-panel"></div>
  </main>

  <footer>
    <p>Read-only triage dashboard. Source: <code>control/registry.json</code> — generated by <code>gen_dashboard_data.js</code></p>
  </footer>

  <script src="dashboard.js"></script>
</body>
</html>
